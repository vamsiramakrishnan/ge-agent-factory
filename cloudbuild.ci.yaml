# CI gate — wire this to a Cloud Source Repositories trigger (push / PR) on the
# default branch. It RUNS the guards that already exist in the repo (source
# hygiene + the full bun test suite) so they stop being dormant. This is separate
# from cloudbuild.yaml, which only builds + pushes the deploy image.
#
#   gcloud builds triggers create cloud-source-repositories \
#     --repo=<repo> --branch-pattern='^(main|master)$' \
#     --build-config=cloudbuild.ci.yaml
steps:
  - id: install
    name: 'oven/bun:1.3'
    entrypoint: bun
    args: ['install', '--frozen-lockfile']

  - id: hygiene
    name: 'oven/bun:1.3'
    entrypoint: bun
    args: ['run', 'source:hygiene']
    waitFor: ['install']

  # Typecheck every workspace. `vite build` strips types, so without this a TS error
  # ships silently — exactly how a bad state-union slipped through once.
  - id: typecheck
    name: 'oven/bun:1.3'
    entrypoint: bun
    args: ['run', 'lint']
    waitFor: ['install']

  # The catalog is a generated build artifact (relocated out of the source tree);
  # generate it so tests/consumers that resolve the catalog can load it.
  - id: catalog
    name: 'oven/bun:1.3'
    entrypoint: bun
    args: ['run', 'catalog']
    waitFor: ['install']

  # Docs-specific gate: link/image/blockquote correctness (tools/docs-check.mjs),
  # diagram-source-vs-generated-SVG drift (tools/gen-docs-diagrams.mjs --check),
  # and design-token drift across packages/design/src/tokens.css,
  # docs/_sass/color_schemes/ge.scss, and tools/lib/docs-diagram-theme.mjs
  # (tools/check-design-tokens.mjs). See docs/DESIGN.md.
  - id: docs-gate
    name: 'oven/bun:1.3'
    entrypoint: bun
    args: ['run', 'docs:gate']
    waitFor: ['install']

  # apps + tools + packages, gated against tools/known-test-failures.json so a
  # name not already in that list fails the build — see AGENTS.md's
  # "Before you commit" section for how that list works and its known gaps.
  - id: test
    name: 'oven/bun:1.3'
    entrypoint: bun
    args: ['run', 'test:gated']
    waitFor: ['hygiene', 'catalog']

options:
  logging: CLOUD_LOGGING_ONLY
