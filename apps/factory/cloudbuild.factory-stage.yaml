substitutions:
  _STAGE: validate
  _ITEM_ID: manual
  # Short (<=26 char) agents-cli project name; the worker derives it from _ITEM_ID
  # via shortAgentName. Defaults to _ITEM_ID for manual/standalone runs.
  _AGENT_NAME: manual
  _WORKSPACE_ARCHIVE: ""
  _ARTIFACT_PREFIX: ""
  _RUNTIME_REGION: us-central1
  _GOOGLE_GENAI_LOCATION: global
  _GEMINI_ENTERPRISE_LOCATION: global
  _GEMINI_ENTERPRISE_APP_ID: ""
  _RUN_AGENT_EVALS: "true"
  _RUN_AGENT_LINT: "true"
  _RUN_AGENT_OPTIMIZE: "false"
  _RUN_DEPLOYED_SMOKE: "true"
  _EVAL_JUDGE_SAMPLES: "5"
  _DISPLAY_NAME: ""
  _DESCRIPTION: ""
  _TOOL_DESCRIPTION: ""
  _PREVIEW_PROMPT: "hello"
  # Shared builder image (toolchain + warm uv cache + ge-factory-run-stage).
  # The worker overrides this with the project-local ge-agent-factory-builder image.
  _BUILDER_IMAGE: "ghcr.io/astral-sh/uv:python3.11-bookworm"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 7200s

steps:
  - id: restore-workspace
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        mkdir -p /workspace/agent
        if [[ -n "${_WORKSPACE_ARCHIVE}" ]]; then
          gcloud storage cp "${_WORKSPACE_ARCHIVE}" /workspace/workspace.tar.gz
          tar -xzf /workspace/workspace.tar.gz -C /workspace/agent
        else
          echo "no _WORKSPACE_ARCHIVE provided for --no-source build" >&2
          exit 2
        fi

  - id: run-stage
    name: ${_BUILDER_IMAGE}
    entrypoint: bash
    dir: /workspace/agent
    env:
      - _STAGE=${_STAGE}
      - _ITEM_ID=${_ITEM_ID}
      - _AGENT_NAME=${_AGENT_NAME}
      - _RUNTIME_REGION=${_RUNTIME_REGION}
      - _RUN_AGENT_EVALS=${_RUN_AGENT_EVALS}
      - _RUN_AGENT_LINT=${_RUN_AGENT_LINT}
      - _RUN_AGENT_OPTIMIZE=${_RUN_AGENT_OPTIMIZE}
      - _RUN_DEPLOYED_SMOKE=${_RUN_DEPLOYED_SMOKE}
      - GE_EVAL_JUDGE_SAMPLES=${_EVAL_JUDGE_SAMPLES}
      - _DISPLAY_NAME=${_DISPLAY_NAME}
      - _DESCRIPTION=${_DESCRIPTION}
      - _TOOL_DESCRIPTION=${_TOOL_DESCRIPTION}
      - _PREVIEW_PROMPT=${_PREVIEW_PROMPT}
      - GE_AGENT_FACTORY_ITEM_ID=${_ITEM_ID}
      - GE_AGENT_FACTORY_ARTIFACT_PREFIX=${_ARTIFACT_PREFIX}
      - PROJECT_ID=${PROJECT_ID}
      - GOOGLE_CLOUD_PROJECT=${PROJECT_ID}
      - GCLOUD_PROJECT=${PROJECT_ID}
      - GOOGLE_GENAI_USE_VERTEXAI=1
      - GOOGLE_GENAI_LOCATION=${_GOOGLE_GENAI_LOCATION}
      - GOOGLE_CLOUD_LOCATION=${_GOOGLE_GENAI_LOCATION}
      - GOOGLE_CLOUD_REGION=${_GOOGLE_GENAI_LOCATION}
      - _GEMINI_ENTERPRISE_APP_ID=${_GEMINI_ENTERPRISE_APP_ID}
      - GEMINI_ENTERPRISE_LOCATION=${_GEMINI_ENTERPRISE_LOCATION}
      - GEMINI_ENTERPRISE_APP_ID=${_GEMINI_ENTERPRISE_APP_ID}
    args:
      - -ceu
      - |
        STAGE_EXIT=0
        if ! command -v ge-factory-run-stage >/dev/null 2>&1; then
          echo "ge-factory-run-stage not found in _BUILDER_IMAGE=${_BUILDER_IMAGE}; run 'ge images build builder' and set GE_AGENT_FACTORY_BUILDER_IMAGE." >&2
          STAGE_EXIT=2
        else
          mkdir -p artifacts
          rm -f "artifacts/factory-${_STAGE}-result.json"
          ge-factory-run-stage > >(tee artifacts/run-stage.log) 2> >(tee -a artifacts/run-stage.log >&2) || STAGE_EXIT=$$?
        fi
        printf '%s\n' "$$STAGE_EXIT" > .ge-stage-exit
        if [[ "$$STAGE_EXIT" -ne 0 && ! -f "artifacts/factory-${_STAGE}-result.json" ]]; then
          mkdir -p artifacts
          python3 - "$$STAGE_EXIT" "${_STAGE}" <<'PY'
        import json
        import pathlib
        import re
        import sys

        exit_code = int(sys.argv[1])
        stage = sys.argv[2]
        log_path = pathlib.Path("artifacts/run-stage.log")
        detail = log_path.read_text(encoding="utf-8", errors="replace") if log_path.exists() else ""
        lines = [line.strip() for line in detail.splitlines() if line.strip()]
        first_error = next(
          (line for line in lines if re.search(r"error|failed|exception|traceback|permission|denied|invalid|threshold|mean_score|timeout|deadline|quota|not found", line, re.I)),
          lines[-1] if lines else f"ge-factory-run-stage exited {exit_code}",
        )
        if len(first_error) > 500:
          first_error = first_error[-500:]
        result = {
          "status": "failed",
          "stage": stage,
          "owner": "cloud_build",
          "nextStage": None,
          "exitCode": exit_code,
          "error": f"ge-factory-run-stage exited {exit_code} before writing a stage result artifact",
          "classification": "stage_command",
          "firstError": first_error,
          "fixHint": "Open the Cloud Build log for the run-stage step; the stage process exited before it could write its structured result.",
        }
        pathlib.Path("artifacts").mkdir(exist_ok=True)
        pathlib.Path(f"artifacts/factory-{stage}-result.json").write_text(json.dumps(result, indent=2) + "\n", encoding="utf-8")
        PY
        fi
        exit 0

  - id: persist-artifacts
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    entrypoint: bash
    dir: /workspace/agent
    args:
      - -ceu
      - |
        if [[ -n "${_ARTIFACT_PREFIX}" ]]; then
          STAGE_EXIT=0
          if [[ -f .ge-stage-exit ]]; then
            STAGE_EXIT="$$(cat .ge-stage-exit)"
          fi
          if [[ -f "artifacts/factory-${_STAGE}-result.json" ]]; then
            gcloud storage cp "artifacts/factory-${_STAGE}-result.json" "${_ARTIFACT_PREFIX}/factory-${_STAGE}-result.json"
          fi
          if [[ "$$STAGE_EXIT" == "0" ]]; then
            tar \
              --exclude .venv \
              --exclude node_modules \
              --exclude .pytest_cache \
              --exclude __pycache__ \
              --exclude .ruff_cache \
              --exclude .mypy_cache \
              --exclude .ge-harness \
              --exclude runs \
              -czf /workspace/agent-result.tar.gz .
            gcloud storage cp /workspace/agent-result.tar.gz "${_ARTIFACT_PREFIX}/agent-result.tar.gz"
            gcloud storage cp /workspace/agent-result.tar.gz "${_ARTIFACT_PREFIX}/workspace.tar.gz"
          else
            echo "stage ${_STAGE} failed with exit $$STAGE_EXIT; preserving previous workspace.tar.gz"
          fi
          for dir in artifacts tests/eval evals; do
            if [[ -e "$dir" ]]; then
              # Sync contents to the exact diagnostic tree and compare hashes so
              # later stages do not upload validation's eval corpus again.
              gcloud storage rsync "$dir" "${_ARTIFACT_PREFIX}/files/./$dir" --recursive --checksums-only || true
            fi
          done
          find . -maxdepth 3 \
            \( -path './.venv' -o -path './node_modules' -o -path './.pytest_cache' -o -path './.ge-harness' -o -path './runs' -o -path './artifacts' -o -path './tests/eval' -o -path './evals' \) -prune -o \
            \( -name '*.json' -o -name '*.md' -o -name '*.jsonl' -o -name '*.log' \) -print0 \
            | xargs -0 -I{} gcloud storage cp "{}" "${_ARTIFACT_PREFIX}/files/{}" || true
        fi

  - id: fail-stage-if-needed
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    entrypoint: bash
    dir: /workspace/agent
    args:
      - -ceu
      - |
        if [[ -f .ge-stage-exit ]]; then
          code="$$(cat .ge-stage-exit)"
          if [[ "$${code}" != "0" ]]; then
            echo "factory stage ${_STAGE} failed with exit $${code}; artifacts have been persisted." >&2
            exit "$${code}"
          fi
        fi
