# Build-only: builds + pushes the presentation/gateway image to Artifact Registry.
# Does NOT deploy — Terraform owns Cloud Run config (installer/terraform/cloud_run.tf).
# Bind a freshly built image to the gateway service with:
#
#   terraform apply -var gateway_image=<region>-docker.pkg.dev/<proj>/<repo>/ge-agent-factory-gateway:<tag>
#
# (installer/build-and-deploy.sh does this automatically). Build context is the repo
# root so the image can include the generator the server imports. Mirrors
# apps/console/cloudbuild.yaml; the root cloudbuild.yaml is the push-trigger variant.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'apps/presentation/Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'
      - '.'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'ge-agent-factory-gateway'
  _AR_REPO: 'cloud-run-source'
  _TAG: 'latest'

options:
  logging: CLOUD_LOGGING_ONLY
