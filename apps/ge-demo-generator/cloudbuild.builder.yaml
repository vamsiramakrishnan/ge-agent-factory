# Builds the shared factory builder image (builder.Dockerfile). Invoked by
# `ge build builder`. _IMAGE is the full Artifact Registry tag to push.
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "builder.Dockerfile", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
images:
  - "${_IMAGE}"
substitutions:
  _IMAGE: ""
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
