# Builds the per-department custom MCP service image. Invoked by `ge mcp deploy`
# (tools/lib/mcp-plane.mjs) via `gcloud builds submit <repoRoot> --config ...`.
#
# The build CONTEXT is the repository root (the positional source = repoRoot), so the
# Dockerfile's `COPY packages/simulator-runtime` + `COPY apps/ge-demo-generator/mcp-service/...`
# resolve — the simulator engine lives in packages/simulator-runtime, outside the app dir.
# _IMAGE is the full Artifact Registry tag to push.
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "apps/ge-demo-generator/mcp-service/Dockerfile", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
images:
  - "${_IMAGE}"
substitutions:
  _IMAGE: ""
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
