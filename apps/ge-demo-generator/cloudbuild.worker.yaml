# Builds the Cloud Run worker image (ge-agent-factory-worker). Invoked by
# `ge factory deploy` / `ge build` (tools/lib/factory-plane.mjs `build`) via
# `gcloud builds submit <repoRoot> --config ...`.
#
# The build CONTEXT is the repository root (the positional source = repoRoot), so the
# Dockerfile's `COPY packages` + `COPY tools` + `COPY apps/ge-demo-generator` resolve —
# the worker imports @ge/run-ledger + @ge/okf (packages/) and tools/lib/*, all OUTSIDE
# the app dir. _IMAGE is the full Artifact Registry tag to push; Terraform then binds it
# to the worker service (installer/terraform/cloud_run.tf).
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "apps/ge-demo-generator/Dockerfile", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
images:
  - "${_IMAGE}"
substitutions:
  _IMAGE: ""
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
