# GE Agent Factory — one-command setup + operations.
# `mise tasks` lists everything. `mise run <task>` runs one. Bare shorthand
# (`mise setup`, `mise console`, …) also works for any task name that isn't
# also a mise built-in command (a handful — doctor/install/uninstall/sync/
# deps/mcp/up — are not; use `mise run <name>` for those).
#
# mise auto-installs the pinned tool versions below the first time you run
# any task here — no separate "install uv" / "download terraform" step.

[tools]
bun = "1.3"
python = "3.11"
uv = "latest"
terraform = "1.9.8"

[env]
_.path = ["{{config_root}}/.local/bin"]
BIN = "{{env.BIN | default(value=env.HOME ~ '/.local/bin')}}"
AGENTS_SKILLS_DIR = "{{env.AGENTS_SKILLS_DIR | default(value=env.HOME ~ '/.agents/skills')}}"

# ── Setup & toolchain ────────────────────────────────────────────────────

[tasks.setup]
description = "Install deps, sync catalog/skills, install the ge command, start the daemon"
run = """#!/usr/bin/env bash
set -euo pipefail
bun install
chmod +x tools/ge.mjs tools/mcp-server.mjs 2>/dev/null || true
mise run catalog
mise run deps
mise run install
mise run skills-sync
bun tools/ge.mjs daemon start || true
echo ""
echo "Setup done."
echo "Next:"
echo "  mise run doctor-local              # confirm local tools are ready"
echo "  mise run console                   # open the Pipeline/Fleet/Activity UI"
echo "  mise run mode-local && CANARY=1 mise run provision-local"
echo "                                     # build one agent locally up to preview"
"""

[tasks.bootstrap]
description = "END-TO-END: toolchain + `ge init` + `ge up` (factory+data+tool planes → doctor). Needs GEMINI_ENTERPRISE_APP_ID + gcloud auth. CANARY=1 also builds one agent."
run = """#!/usr/bin/env bash
set -euo pipefail
if [ -z "${GEMINI_ENTERPRISE_APP_ID:-}" ] && [ ! -f .ge.json ]; then
  echo "✗ Set GEMINI_ENTERPRISE_APP_ID first (your Gemini Enterprise app resource name), e.g."
  echo "    export GEMINI_ENTERPRISE_APP_ID=projects/<num>/locations/global/collections/default_collection/engines/<app>"
  exit 1
fi
command -v gcloud >/dev/null 2>&1 || { echo "✗ gcloud not found — install + 'gcloud auth login' first: https://cloud.google.com/sdk/docs/install"; exit 1; }
echo "── 1/3  toolchain (bun · uv · agents-cli · antigravity · terraform) ──"
mise run setup
echo ""
echo "── 2/3  discover config → .ge.json ──"
bun tools/ge.mjs init
echo ""
echo "── 3/3  stand up the platform (terraform: factory + data stores + IAM → images → MCP services → doctor) ──"
bun tools/ge.mjs up
if [ -n "${CANARY:-}" ]; then
  echo ""
  echo "── canary: build one agent end-to-end ──"
  bun tools/ge.mjs agents build --canary
fi
echo ""
echo "✓ Bootstrap complete. Next: ge agents build --all   ·   console: mise run console   ·   local-only: mise run mode-local && CANARY=1 mise run provision-local"
"""

[tasks.all]
description = "Alias for bootstrap"
depends = ["bootstrap"]
run = "true"

[tasks.catalog]
description = "Generate the use-case catalog build artifact (git-ignored) from the slide + interview registries"
run = "cd apps/factory && bun scripts/sync-use-cases-from-slides.mjs"

[tasks.ci]
description = "Run the CI gate locally (source hygiene + full bun test suite) — mirrors cloudbuild.ci.yaml"
run = """#!/usr/bin/env bash
set -euo pipefail
bun run source:hygiene
mise run catalog
bun test apps tools
"""

[tasks.install-hooks]
description = "Install the git pre-commit hook (fast: runs source hygiene before each commit)"
run = """#!/usr/bin/env bash
set -euo pipefail
mkdir -p .git/hooks
ln -sf ../../tools/hooks/pre-commit .git/hooks/pre-commit
chmod +x tools/hooks/pre-commit
echo "Installed pre-commit hook → tools/hooks/pre-commit (full suite runs in CI / mise run ci)"
"""

[tasks.deps]
description = "Install the local toolchain extras: agents-cli + repo .venv with google-antigravity SDK (bun/uv/terraform/python come from [tools] above)"
run = """#!/usr/bin/env bash
set -uo pipefail
uv tool install 'google-agents-cli>=0.2,<0.3' || true  # pin <0.3: keeps 'eval run --all' (removed in 0.3+/0.5)
echo "Creating repo .venv (uv) + installing google-antigravity SDK (no system Python pollution)…"
test -x .venv/bin/python || uv venv --python 3.11 .venv
.venv/bin/python -c "import google.antigravity" 2>/dev/null \
  || uv pip install --python .venv/bin/python -q google-antigravity \
  || echo "⚠  could not install google-antigravity into .venv — check uv + network"
.venv/bin/python -c "import google.antigravity" 2>/dev/null \
  && echo "✓ google.antigravity importable (.venv)" \
  || echo "✗ google.antigravity NOT importable — local (Antigravity) mode will fail"
echo "Installing the simulator-runtime package (editable) into .venv — the BYO synthesis CLI imports it…"
.venv/bin/python -c "import simulator_runtime" 2>/dev/null \
  || uv pip install --python .venv/bin/python -q -e packages/simulator-runtime \
  || echo "⚠  could not install simulator-runtime into .venv — BYO synthesis will fail to import simulator_runtime"
.venv/bin/python -c "import simulator_runtime" 2>/dev/null \
  && echo "✓ simulator_runtime importable (.venv)" \
  || echo "✗ simulator_runtime NOT importable — BYO synthesis (console) will fail"
mise run data-runtime
command -v gcloud >/dev/null 2>&1 \
  && echo "✓ gcloud present" \
  || echo "⚠  gcloud not found — needed for cloud ops (up/data/mcp/provision). Install: https://cloud.google.com/sdk/docs/install"
"""

[tasks.data-runtime]
description = "Warm the local data-generation runtime used by mission mock/simulator stages"
run = """#!/usr/bin/env bash
set -uo pipefail
mkdir -p .ge/cache/uv
echo "Warming Snowfakery runtime in .ge/cache/uv…"
UV_CACHE_DIR=.ge/cache/uv uv run --refresh --with snowfakery --with 'setuptools<81' python -c "import snowfakery, pkg_resources; print('✓ snowfakery runtime ready')" \
  || echo "⚠  could not warm Snowfakery runtime — mock/simulator missions will pause at data readiness until network/cache is available"
"""

[tasks.install]
description = "Install the `ge` command into $BIN (default ~/.local/bin; override with BIN=...)"
run = '''#!/usr/bin/env bash
set -euo pipefail
mkdir -p "$BIN"
printf '#!/usr/bin/env bash\nexec bun "%s/tools/ge.mjs" "$@"\n' "$PWD" > "$BIN/ge"
chmod +x "$BIN/ge"
echo "Installed: $BIN/ge"
case ":$PATH:" in
  *":$BIN:"*) : ;;
  *) echo ""
     echo "############################################################"
     echo "  WARNING: $BIN is NOT on your PATH — the 'ge' command won't be found."
     echo "  Add this line to your shell profile (~/.bashrc, ~/.zshrc, etc.):"
     echo ""
     echo "      export PATH=\"$BIN:\$PATH\""
     echo ""
     echo "  Then restart your shell (or run: source ~/.bashrc)."
     echo "############################################################"
     echo "" ;;
esac
'''

[tasks.uninstall]
description = "Remove the `ge` command"
run = 'rm -f "$BIN/ge" && echo "removed $BIN/ge"'

[tasks.build-ge-binary]
description = "Compile `ge` into a standalone native binary (dist/ge) — alternative to the bash wrapper `install` uses"
run = """#!/usr/bin/env bash
set -euo pipefail
mkdir -p dist
bun build --compile -e better-sqlite3 -e pg tools/ge.mjs --outfile dist/ge
echo "Built: dist/ge ($(du -h dist/ge | cut -f1))"
echo "  Run directly: ./dist/ge --help"
echo "  Note: not wired into 'install' yet — that still installs the bun-wrapper script."
"""

# ── Skills (harness) ─────────────────────────────────────────────────────

[tasks.skills-sync]
description = "Validate repository skills and write the harness skill manifest"
run = "node scripts/sync-harness-skills.mjs"

[tasks.skills-doctor]
description = "Verify the harness skill manifest is current and complete"
run = """#!/usr/bin/env bash
set -euo pipefail
node scripts/sync-harness-skills.mjs --check
bun apps/factory/src/cli.js skills >/dev/null
echo "✓ harness skills are discoverable"
"""

[tasks.skills-spec-audit]
description = "Report Agent Skills spec portability gaps for repo skills"
run = "node skills/navigating-factory-line/scripts/audit-agent-skills-spec.mjs"

[tasks.skills-install]
description = "Install repo skills into a headless harness (AGENTS_SKILLS_DIR, default ~/.agents/skills) + sync manifest"
run = """#!/usr/bin/env bash
set -euo pipefail
mise run skills-sync
mkdir -p "$AGENTS_SKILLS_DIR"
for d in "$PWD"/skills/*/; do
  name=$(basename "$d")
  ln -sfn "$d" "$AGENTS_SKILLS_DIR/$name"
done
echo "✓ linked $(ls -1d skills/*/ | wc -l | tr -d ' ') skills -> $AGENTS_SKILLS_DIR"
echo "  headless: source .ge/skills/env.sh && ge daemon start     (or: ge mcp-server)"
echo "  uninstall: rm -f $AGENTS_SKILLS_DIR/*  (symlinks only)"
"""

# ── Platform ops (cloud build + deploy) ─────────────────────────────────

[tasks.doctor]
description = "Cloud preflight (APIs, IAM, IAP, memory, health)"
run = "bun tools/ge.mjs doctor"

[tasks.doctor-local]
description = "Local toolchain preflight (uv, python 3.11, agents-cli, shared cache)"
run = "bun tools/ge.mjs doctor --local"

[tasks.devex-check]
description = "Fast DevEx gate: local doctor + docs links + workspace manifest contracts (ID=<workspace-or-usecase>)"
run = 'bun tools/ge.mjs devex check ${ID:+--id "$ID"}'

[tasks.docs-gate]
description = "Docs-specific gate: link/image/blockquote check, diagram freshness, design-token drift"
run = "bun run docs:gate"

[tasks.devex-smoke]
description = "One-command local proof: doctor → local mode → one validated canary workspace (ID=<usecase> TARGET=validated|previewed)"
run = 'bun tools/ge.mjs devex smoke ${ID:+--id "$ID"} ${TARGET:+--target "$TARGET"}'

[tasks.up]
description = "Terraform apply → build → re-apply → init → doctor (fresh project)"
run = "bun tools/ge.mjs up"

[tasks.cutover]
description = "Adopt a hand-managed project into Terraform (plan; APPLY=1 to apply)"
run = 'bun tools/ge.mjs cutover ${APPLY:+--apply}'

[tasks.data]
description = "Data plane: terraform apply (GCS/BigQuery/AlloyDB/Bigtable/Firestore) → merge coords into .ge.json"
run = "bun tools/ge.mjs data up"

[tasks.data-doctor]
description = "Check shared data stores and local mock/simulator data runtime"
run = "bun tools/ge.mjs data doctor"

[tasks.mcp-deploy]
description = "Tool plane: deploy the 5 per-department custom MCP services to Cloud Run (fleet-level)"
run = "bun tools/ge.mjs mcp deploy"

[tasks.mcp-doctor]
description = "Check the per-department MCP services + Agent Registry readiness"
run = "bun tools/ge.mjs mcp doctor"

[tasks.status]
description = "Status board: project/app, mode, planes ✓/○, next command"
run = "bun tools/ge.mjs"

[tasks.mode-local]
description = "Switch to local mode (build on this machine, up to the build boundary)"
run = "bun tools/ge.mjs mode local"

[tasks.mode-remote]
description = "Switch to remote mode (cloud factory builds + deploys)"
run = "bun tools/ge.mjs mode remote"

[tasks.provision]
description = "Build agents in the active mode (CANARY=1 for one, else --all)"
run = 'bun tools/ge.mjs agents build ${CANARY:+--canary} ${CANARY:---all}'

[tasks.provision-local]
description = "Build agents on this machine via the Antigravity harness (CANARY=1 for one)"
run = 'bun tools/ge.mjs agents build --local ${CANARY:+--canary} ${CANARY:---all}'

[tasks.sync]
description = "Sync generated agent code → git (active mode; GCS in remote, workspaces in local)"
run = "bun tools/ge.mjs agents sync --push"

[tasks.sync-local]
description = "Push locally-generated agents to the dedicated repo (creates it if missing)"
run = "bun tools/ge.mjs agents sync --local --create --push"

[tasks.mcp-server]
description = "Run the factory's MCP server (stdio) for harness/model callers"
run = "bun tools/mcp-server.mjs"

[tasks.mcp]
description = "Alias for mcp-server (the tool-plane deploy is `mcp-deploy`)"
depends = ["mcp-server"]
run = "true"

# ── Dev — run ONE app locally ────────────────────────────────────────────

[tasks.dev]
description = "Explain console/presentation/generator and how to run one local app (starts nothing)"
run = "bun scripts/dev-help.mjs || true"

[tasks.console]
description = "Run the main ops UI: Pipeline, specs, Fleet, Activity, Doctor → http://localhost:18260"
run = "cd apps/console && bun install && bun run dev"

[tasks.presentation]
description = "Run the transformation deck and source use-case catalog → http://localhost:18250"
run = "cd apps/presentation && bun install && bun run dev"

[tasks.generator]
description = "Run the lower-level generator workbench for mock data/workspaces → http://localhost:17655"
run = "bun run --filter ./apps/factory dev"

[tasks.build-console]
description = "Production build of the console (apps/console/dist)"
run = "cd apps/console && bun install && bun run build"

[tasks.build-presentation]
description = "Production build of the deck (apps/presentation/dist)"
run = "cd apps/presentation && bun install && bun run build"

[tasks.serve-console]
description = "Serve the built console via Bun (PORT, default 8261)"
run = 'cd apps/console && PORT="${PORT:-8261}" bun run start'

[tasks.serve-presentation]
description = "Serve the built deck via Bun (PORT, default 8251)"
run = 'cd apps/presentation && PORT="${PORT:-8251}" bun run start'

# ── Orientation ──────────────────────────────────────────────────────────

[tasks.next]
description = "Explain the next useful command and show the ge status board when available"
run = """#!/usr/bin/env bash
set -uo pipefail
printf "\\n\\033[1mRecommended next steps\\033[0m\\n"
printf "  Fresh clone or broken deps:       \\033[36mmise run setup\\033[0m\\n"
printf "  Local health check:               \\033[36mmise run doctor-local\\033[0m\\n"
printf "  Fast DevEx gate:                  \\033[36mmise run devex-check\\033[0m\\n"
printf "  One-command local proof:          \\033[36mmise run devex-smoke\\033[0m\\n"
printf "  Open the main UI:                 \\033[36mmise run console\\033[0m  (http://localhost:18260)\\n"
printf "  Build one agent locally:          \\033[36mmise run mode-local && CANARY=1 mise run provision-local\\033[0m\\n"
printf "  Watch runs and blockers:          \\033[36mmise run console\\033[0m  then open Activity, or run \\033[36mge agents status --watch\\033[0m\\n"
printf "  Cloud install / deploy path:      \\033[36mGEMINI_ENTERPRISE_APP_ID=... CANARY=1 mise run bootstrap\\033[0m\\n"
printf "  Before pushing code:              \\033[36mmise run ci\\033[0m\\n"
printf "\\n\\033[1mCurrent factory status\\033[0m\\n"
command -v bun >/dev/null 2>&1 && bun tools/ge.mjs || printf "  Bun is not available yet. Run 'mise run setup' first.\\n"
"""

[tasks.help]
description = "Show what to run (grouped) — same as `mise tasks`, plus the big picture"
run = """#!/usr/bin/env bash
set -uo pipefail
printf "\\n\\033[1mGE Agent Factory — what should I run?\\033[0m\\n"
printf "\\n\\033[1mBig picture\\033[0m\\n"
printf "  This repo is an agent factory: it turns a business use case into a generated,\\n"
printf "  testable, deployable Gemini Enterprise agent. The flow is:\\n"
printf "    1. Pick or interview for a spec\\n"
printf "    2. Generate mock data, simulator behavior, agent code, tests, and evals\\n"
printf "    3. Validate locally up to preview\\n"
printf "    4. Optionally ship the checked workspace to your cloud project for data load,\\n"
printf "       runtime deploy, tool registration, publish, and live verification\\n"
printf "\\n"
printf "  \\033[36mLocal mode\\033[0m is for development: fast iteration, generated workspaces, tests,\\n"
printf "  simulator data, and preview checks on your machine.\\n"
printf "  \\033[36mRemote mode\\033[0m is for release: the cloud factory builds/deploys/publishes in\\n"
printf "  your GCP project after the platform planes are ready.\\n"
printf "  \\033[36mConsole\\033[0m is the main UI over the same engine: Pipeline, spec search, Fleet,\\n"
printf "  Activity, Doctor, blockers, artifacts, and run controls.\\n"
printf "\\n\\033[1mStart here (local development, no cloud deploy required)\\033[0m\\n"
printf "  \\033[36mmise run setup\\033[0m                 Install deps, sync catalog/skills, install the ge command, start the daemon\\n"
printf "  \\033[36mmise run doctor-local\\033[0m          Check local tools: Bun, uv, Python, agents-cli, cache, harness wiring\\n"
printf "  \\033[36mmise run devex-check\\033[0m           Fast gate: local doctor, docs links, workspace manifest contracts\\n"
printf "  \\033[36mmise run devex-smoke\\033[0m           Prove the local path: doctor → local mode → one validated canary workspace\\n"
printf "  \\033[36mmise run console\\033[0m               Open the operator UI for Pipeline, Fleet, Activity, Doctor, and generated specs\\n"
printf "  \\033[36mCANARY=1 mise run provision-local\\033[0m Build one generated agent locally up to the preview/build boundary\\n"
printf "\\n\\033[1mWhich local app should I run?\\033[0m\\n"
printf "  \\033[36mconsole\\033[0m       The day-to-day developer/operator UI: choose specs, run Pipeline, inspect runs and blockers\\n"
printf "  \\033[36mpresentation\\033[0m  The transformation deck and source use-case catalog used to explain the system\\n"
printf "  \\033[36mgenerator\\033[0m     Lower-level generator workbench for mock data, harness runs, and generated workspaces\\n"
printf "\\n\\033[1mIf you are deploying to a cloud project\\033[0m\\n"
printf "  export GEMINI_ENTERPRISE_APP_ID=projects/<num>/locations/global/collections/default_collection/engines/<app>\\n"
printf "  \\033[36mCANARY=1 mise run bootstrap\\033[0m     Stand up planes and prove one agent end to end\\n"
printf "\\n\\033[1mNeed a status-based recommendation?\\033[0m  Run \\033[36mmise run next\\033[0m\\n"
printf "\\n\\033[1mFull task list with descriptions:\\033[0m  \\033[36mmise tasks\\033[0m\\n"
"""
