<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920.6729999999999 508" width="920.6729999999999" height="508" style="--bg:#ffffff;--fg:#14171c;--line:#565e6c;--accent:#2953ff;--muted:#79818e;--surface:#eceef2;--border:#dfe2e8;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="loop" data-label="streaming spec">
  <rect x="30" y="198" width="732.256" height="100" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="30" y="198" width="128.52999999999997" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="207" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">loop [streaming spec]</text>
</g>
<line class="lifeline" data-actor="O" x1="83.651" y1="70" x2="83.651" y2="478" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="C" x1="252.07849999999996" y1="70" x2="252.07849999999996" y2="478" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="R" x1="464.96599999999995" y1="70" x2="464.96599999999995" y2="478" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="H" x1="672.6664999999999" y1="70" x2="672.6664999999999" y2="478" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="S" x1="841.4644999999999" y1="70" x2="841.4644999999999" y2="478" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="O" data-to="C" data-label="start interview, provide brief + BRD" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.651" y1="90" x2="252.07849999999996" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="167.86475" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">start interview, provide brief + BRD</text>
</g>
<g class="message" data-from="C" data-to="R" data-label="runtimeStart(harness.run)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="252.07849999999996" y1="130" x2="464.96599999999995" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="358.52225" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">runtimeStart(harness.run)</text>
</g>
<g class="message" data-from="R" data-to="H" data-label="launch interview run" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="464.96599999999995" y1="170" x2="672.6664999999999" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="568.81625" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">launch interview run</text>
</g>
<g class="message" data-from="H" data-to="C" data-label="artifact identifier=&quot;agent-spec&quot; chunk" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="672.6664999999999" y1="238" x2="252.07849999999996" y2="238" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="462.37249999999995" y="228" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">artifact identifier=&quot;agent-spec&quot; chunk</text>
</g>
<g class="message" data-from="C" data-to="O" data-label="canvas renders workflow / answerable queries incrementally" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="252.07849999999996" y1="278" x2="83.651" y2="278" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="167.86475" y="268" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">canvas renders workflow / answerable queries incrementally</text>
</g>
<g class="message" data-from="O" data-to="C" data-label="edit + confirm spec" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.651" y1="318" x2="252.07849999999996" y2="318" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="167.86475" y="308" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">edit + confirm spec</text>
</g>
<g class="message" data-from="C" data-to="S" data-label="POST /api/interviews/:id/spec" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="252.07849999999996" y1="358" x2="841.4644999999999" y2="358" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="546.7715" y="348" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">POST /api/interviews/:id/spec</text>
</g>
<g class="message" data-from="O" data-to="S" data-label="GET /api/interviews/:id/okf" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.651" y1="398" x2="841.4644999999999" y2="398" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="462.55774999999994" y="388" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /api/interviews/:id/okf</text>
</g>
<g class="message" data-from="S" data-to="O" data-label="OKF Knowledge Bundle (files, conceptCount)" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="841.4644999999999" y1="438" x2="83.651" y2="438" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="462.55774999999994" y="428" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">OKF Knowledge Bundle (files, conceptCount)</text>
</g>
<g class="actor" data-id="O" data-label="Operator" data-type="participant">
  <rect x="40" y="30" width="87.30199999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="83.651" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Operator</text>
</g>
<g class="actor" data-id="C" data-label="Console (SpecCanvas)" data-type="participant">
  <rect x="167.30199999999996" y="30" width="169.55299999999997" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="252.07849999999996" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Console (SpecCanvas)</text>
</g>
<g class="actor" data-id="R" data-label="POST /api/runtime/tasks" data-type="participant">
  <rect x="376.85499999999996" y="30" width="176.22199999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="464.96599999999995" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">POST /api/runtime/tasks</text>
</g>
<g class="actor" data-id="H" data-label="Harness (Antigravity)" data-type="participant">
  <rect x="593.0769999999999" y="30" width="159.179" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="672.6664999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Harness (Antigravity)</text>
</g>
<g class="actor" data-id="S" data-label="Spec store" data-type="participant">
  <rect x="792.256" y="30" width="98.41699999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="841.4644999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Spec store</text>
</g>
</svg>
