behaviorContract + generationSpec" data-shape="rectangle">
  <rect x="241.539" y="84" width="252.39399999999998" height="53.800000000000004" rx="0" ry="0" fill="#f6ddd1" stroke="#cc3d0d" stroke-width="0.75" />
  <text x="367.736" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a18"><tspan x="367.736" dy="-3.9000000000000012">contract</tspan><tspan x="367.736" dy="16.900000000000002">behaviorContract + generationSpec</tspan></text>
</g>
<g class="node" data-id="PROOF" data-label="simulation, evals, proof" data-shape="hexagon">
  <polygon points="551.158,92.45 726.5559999999999,92.45 735.781,110.9 726.5559999999999,129.35000000000002 551.158,129.35000000000002 541.933,110.9" fill="#dfeadf" stroke="#2e7a47" stroke-width="0.75" />
  <text x="638.857" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a18" dy="4.55">simulation, evals, proof</text>
</g>
<g class="node" data-id="SCAFFOLD" data-label="agent project scaffold
app/agent.py · pyproject.toml" data-shape="rectangle">
