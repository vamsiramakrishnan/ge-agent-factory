<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1469.0299999999997 193.80000000000004" width="1469.0299999999997" height="193.80000000000004" style="--bg:#f7f7f5;--fg:#1a1a18;--line:#55554f;--accent:#cc3d0d;--muted:#7c7c74;--surface:#e3e3df;--border:#d4d4cf;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="FACTORY" data-label="GE Agent Factory (this repo)">
  <rect x="40" y="40" width="711.781" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="40" width="711.781" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">GE Agent Factory (this repo)</text>
</g>
<g class="subgraph" data-id="CLI" data-label="agents-cli / ADK (generated and driven by the factory)">
  <rect x="771.781" y="40" width="467.70999999999987" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="771.781" y="40" width="467.70999999999987" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="783.781" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">agents-cli / ADK (generated and driven by the factory)</text>
</g>
<g class="subgraph" data-id="GE_ENT" data-label="Gemini Enterprise">
  <rect x="1259.4909999999998" y="40.00000000000003" width="169.539" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="1259.4909999999998" y="40.00000000000003" width="169.539" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="1271.4909999999998" y="54.00000000000003" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">Gemini Enterprise</text>
</g>
<polyline class="edge" data-from="PROOF" data-to="SCAFFOLD" data-style="thick" data-arrow-start="false" data-arrow-end="true" points="735.781,110.9 751.781,110.9 761.781,110.9 761.781,110.9 771.781,110.9 787.781,110.9" fill="none" stroke="var(--_line)" stroke-width="2" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="DEPLOY" data-to="PUBLISH" data-style="thick" data-arrow-start="false" data-arrow-end="true" points="1223.4909999999998,110.9 1239.4909999999998,110.9 1249.4909999999998,110.9 1249.4909999999998,110.89999999999998 1259.4909999999998,110.90000000000003 1275.4909999999998,110.90000000000003" fill="none" stroke="var(--_line)" stroke-width="2" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="INTENT" data-to="CONTRACT" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="193.539,110.9 241.539,110.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="CONTRACT" data-to="PROOF" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="493.933,110.9 541.933,110.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="SCAFFOLD" data-to="DEPLOY" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="999.4199999999998,110.9 1047.4199999999998,110.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="INTENT" data-label="enterprise intent" data-shape="stadium">
  <rect x="56" y="92.45" width="137.539" height="36.900000000000006" rx="18.450000000000003" ry="18.450000000000003" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="124.7695" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">enterprise intent</text>
</g>
