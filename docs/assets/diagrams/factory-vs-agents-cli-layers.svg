  <text x="893.6004999999999" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="893.6004999999999" dy="-3.9000000000000012">agent project scaffold</tspan><tspan x="893.6004999999999" dy="16.900000000000002">app/agent.py · pyproject.toml</tspan></text>
</g>
<g class="node" data-id="DEPLOY" data-label="deploy → Agent Runtime" data-shape="stadium">
  <rect x="1047.4199999999998" y="92.45" width="176.07099999999997" height="36.900000000000006" rx="18.450000000000003" ry="18.450000000000003" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1135.4554999999998" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">deploy → Agent Runtime</text>
</g>
<g class="node" data-id="PUBLISH" data-label="published agent
end users talk to" data-shape="stadium">
  <rect x="1275.4909999999998" y="84.00000000000003" width="137.539" height="53.800000000000004" rx="26.900000000000002" ry="26.900000000000002" fill="#dfeadf" stroke="#2e7a47" stroke-width="0.75" />
  <text x="1344.2604999999999" y="110.90000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a18"><tspan x="1344.2604999999999" dy="-3.9000000000000012">published agent</tspan><tspan x="1344.2604999999999" dy="16.900000000000002">end users talk to</tspan></text>
</g>
</svg>
