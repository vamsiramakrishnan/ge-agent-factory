<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 547.5729999999999 248.05" width="547.5729999999999" height="248.05" style="--bg:#ffffff;--fg:#14171c;--line:#565e6c;--accent:#2953ff;--muted:#79818e;--surface:#eceef2;--border:#dfe2e8;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="B" data-to="C" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="100,140.25 124,140.25 124,99.35000000000001 255.179,99.35000000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="B" data-to="D" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="100,140.25 124,140.25 124,181.15 148,181.15" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="A" data-label="&quot;architecture.pipeline
[{label, description}" data-shape="rectangle">
  <rect x="40" y="40" width="167.179" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="123.5895" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="123.5895" dy="-3.9000000000000012">&quot;architecture.pipeline</tspan><tspan x="123.5895" dy="16.900000000000002">[{label, description}</tspan></text>
</g>
<g class="node" data-id="B" data-label="B" data-shape="rectangle">
  <rect x="40" y="121.80000000000001" width="60" height="36.900000000000006" rx="0" ry="0" fill="#e6ebff" stroke="#2953ff" stroke-width="0.75" />
  <text x="70" y="140.25" text-anchor="middle" font-size="13" font-weight="500" fill="#14171c" dy="4.55">B</text>
</g>
<g class="node" data-id="C" data-label="spec generation
WRITES behaviorContract.workflow" data-shape="rectangle">
  <rect x="255.179" y="72.45" width="252.3939999999999" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="381.376" y="99.35000000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="381.376" dy="-3.9000000000000012">spec generation</tspan><tspan x="381.376" dy="16.900000000000002">WRITES behaviorContract.workflow</tspan></text>
</g>
<g class="node" data-id="D" data-label="build
derives multi-agent topology" data-shape="rectangle">
  <rect x="148" y="154.25" width="204.22899999999996" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="250.11449999999996" y="181.15" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="250.11449999999996" dy="-3.9000000000000012">build</tspan><tspan x="250.11449999999996" dy="16.900000000000002">derives multi-agent topology</tspan></text>
</g>
</svg>
