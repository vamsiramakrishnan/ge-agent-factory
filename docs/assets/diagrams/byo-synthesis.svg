  <text x="152.85899999999998" y="160.25" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="152.85899999999998" dy="-12.350000000000001">sketch</tspan><tspan x="152.85899999999998" dy="16.900000000000002">collections, keys, fields,</tspan><tspan x="152.85899999999998" dy="16.900000000000002">optional state machine</tspan></text>
</g>
