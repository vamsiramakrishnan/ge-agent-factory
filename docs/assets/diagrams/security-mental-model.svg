  <rect x="422.5774999999999" y="386.90000000000003" width="132.352" height="36.900000000000006" fill="var(--_node-fill)" stroke="none" />
  <line x1="422.5774999999999" y1="386.90000000000003" x2="422.5774999999999" y2="423.80000000000007" stroke="var(--_node-stroke)" stroke-width="0.75" />
