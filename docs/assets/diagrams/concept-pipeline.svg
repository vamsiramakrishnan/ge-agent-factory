  <text x="897.2379999999999" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="897.2379999999999" dy="-3.9000000000000012">simulate</tspan><tspan x="897.2379999999999" dy="16.900000000000002">fixtures / MCP</tspan></text>
