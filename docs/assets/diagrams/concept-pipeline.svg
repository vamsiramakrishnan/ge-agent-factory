<polyline class="edge" data-from="DEP" data-to="PUB" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="1149.6939999999997,66.9 1197.6939999999997,66.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
