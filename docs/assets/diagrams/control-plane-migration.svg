  <text x="125.44199999999998" y="431.45000000000005" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a18"><tspan x="125.44199999999998" dy="-12.350000000000001">Phase 4</tspan><tspan x="125.44199999999998" dy="16.900000000000002">Pipeline state machine</tspan><tspan x="125.44199999999998" dy="16.900000000000002">(ledger transitions)</tspan></text>
