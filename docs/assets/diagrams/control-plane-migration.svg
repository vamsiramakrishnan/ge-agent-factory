  <text x="125.44199999999998" y="660.4" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a18"><tspan x="125.44199999999998" dy="-3.9000000000000012">Remaining flips</tspan><tspan x="125.44199999999998" dy="16.900000000000002">(gated on live env)</tspan></text>
</g>
