  <text x="125.44199999999998" y="550.15" text-anchor="middle" font-size="13" font-weight="500" fill="#1a1a18"><tspan x="125.44199999999998" dy="-12.350000000000001">Phase 5</tspan><tspan x="125.44199999999998" dy="16.900000000000002">ge apply reconciler</tspan><tspan x="125.44199999999998" dy="16.900000000000002">(drift diffing)</tspan></text>
