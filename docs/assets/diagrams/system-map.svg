<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1338.779 343.4" width="1338.779" height="343.4" style="--bg:#ffffff;--fg:#202124;--line:#5f6368;--accent:#1a73e8;--muted:#80868b;--surface:#eef3f9;--border:#dadce0;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="FACTORY" data-label="the factory: three planes">
  <rect x="357.726" y="40" width="431.40799999999996" height="263.4" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="357.726" y="40" width="431.40799999999996" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="369.726" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">the factory: three planes</text>
</g>
<polyline class="edge" data-from="UC" data-to="SPEC" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="150.863,171.7 198.863,171.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="SPEC" data-to="FACTORY" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="309.726,171.7 357.726,171.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FACTORY" data-to="AGENT" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="789.134,171.7 837.134,171.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="AGENT" data-to="GE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="1067.298,171.7 1115.298,171.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FP" data-to="DP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="555.3042,154.7 555.3042,178.7 497.52866666666665,178.7 497.52866666666665,202.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FP" data-to="TP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="627.8073999999999,154.7 627.8073999999999,166.7 711.2326666666667,166.7 711.2326666666667,202.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="DP" data-to="FP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="435.62733333333335,202.7 435.62733333333335,166.7 519.0526,166.7 519.0526,154.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="TP" data-to="FP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="649.3313333333333,202.7 649.3313333333333,178.7 591.5558,178.7 591.5558,154.7" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="UC" data-label="use case
or interview" data-shape="stadium">
  <rect x="40" y="144.79999999999998" width="110.863" height="53.800000000000004" rx="26.900000000000002" ry="26.900000000000002" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="95.4315" y="171.7" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="95.4315" dy="-3.9000000000000012">use case</tspan><tspan x="95.4315" dy="16.900000000000002">or interview</tspan></text>
</g>
<g class="node" data-id="SPEC" data-label="spec (OKF)
the contract" data-shape="rectangle">
  <rect x="198.863" y="144.79999999999998" width="110.86299999999999" height="53.800000000000004" rx="0" ry="0" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.75" />
  <text x="254.2945" y="171.7" text-anchor="middle" font-size="13" font-weight="500" fill="#202124"><tspan x="254.2945" dy="-3.9000000000000012">spec (OKF)</tspan><tspan x="254.2945" dy="16.900000000000002">the contract</tspan></text>
</g>
<g class="node" data-id="AGENT" data-label="deployed agent
Agent Runtime, your GCP project" data-shape="rectangle">
  <rect x="837.134" y="144.79999999999998" width="230.164" height="53.800000000000004" rx="0" ry="0" fill="#e6f4ea" stroke="#34a853" stroke-width="0.75" />
  <text x="952.216" y="171.7" text-anchor="middle" font-size="13" font-weight="500" fill="#202124"><tspan x="952.216" dy="-3.9000000000000012">deployed agent</tspan><tspan x="952.216" dy="16.900000000000002">Agent Runtime, your GCP project</tspan></text>
</g>
<g class="node" data-id="GE" data-label="Gemini Enterprise
published, discoverable" data-shape="stadium">
  <rect x="1115.298" y="144.79999999999998" width="183.481" height="53.800000000000004" rx="26.900000000000002" ry="26.900000000000002" fill="#e6f4ea" stroke="#34a853" stroke-width="0.75" />
  <text x="1207.0385" y="171.7" text-anchor="middle" font-size="13" font-weight="500" fill="#202124"><tspan x="1207.0385" dy="-3.9000000000000012">Gemini Enterprise</tspan><tspan x="1207.0385" dy="16.900000000000002">published, discoverable</tspan></text>
</g>
<g class="node" data-id="FP" data-label="factory plane
gateway, queue, worker
build + validate + refine" data-shape="rectangle">
  <rect x="482.801" y="84" width="181.25799999999998" height="70.7" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="573.43" y="119.35" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="573.43" dy="-12.350000000000001">factory plane</tspan><tspan x="573.43" dy="16.900000000000002">gateway, queue, worker</tspan><tspan x="573.43" dy="16.900000000000002">build + validate + refine</tspan></text>
</g>
<g class="node" data-id="DP" data-label="data plane
GCS, AlloyDB, Firestore,
BigQuery, Bigtable" data-shape="cylinder">
  <rect x="373.726" y="209.7" width="185.70399999999998" height="70.7" fill="#e8f0fe" stroke="none" />
  <line x1="373.726" y1="209.7" x2="373.726" y2="280.4" stroke="#1a73e8" stroke-width="0.75" />
  <line x1="559.43" y1="209.7" x2="559.43" y2="280.4" stroke="#1a73e8" stroke-width="0.75" />
  <ellipse cx="466.578" cy="280.4" rx="92.85199999999999" ry="7" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.75" />
  <ellipse cx="466.578" cy="209.7" rx="92.85199999999999" ry="7" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.75" />
  <text x="466.578" y="245.04999999999998" text-anchor="middle" font-size="13" font-weight="500" fill="#202124"><tspan x="466.578" dy="-12.350000000000001">data plane</tspan><tspan x="466.578" dy="16.900000000000002">GCS, AlloyDB, Firestore,</tspan><tspan x="466.578" dy="16.900000000000002">BigQuery, Bigtable</tspan></text>
</g>
<g class="node" data-id="TP" data-label="tool plane
Agent Gateway +
MCP services + registry" data-shape="rectangle">
  <rect x="587.43" y="202.7" width="185.70399999999998" height="70.7" rx="0" ry="0" fill="#e6f4ea" stroke="#34a853" stroke-width="0.75" />
  <text x="680.2819999999999" y="238.04999999999998" text-anchor="middle" font-size="13" font-weight="500" fill="#202124"><tspan x="680.2819999999999" dy="-12.350000000000001">tool plane</tspan><tspan x="680.2819999999999" dy="16.900000000000002">Agent Gateway +</tspan><tspan x="680.2819999999999" dy="16.900000000000002">MCP services + registry</tspan></text>
</g>
</svg>
