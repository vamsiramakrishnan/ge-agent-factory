  <text x="255.70399999999998" y="683.6999999999999" text-anchor="middle" font-size="13" font-weight="500" fill="#14171c"><tspan x="255.70399999999998" dy="-3.9000000000000012">Gemini Enterprise</tspan><tspan x="255.70399999999998" dy="16.900000000000002">published, discoverable</tspan></text>
</g>
<g class="node" data-id="FP" data-label="factory plane
gateway, queue, worker
build + validate + refine" data-shape="rectangle">
  <rect x="165.075" y="287.6" width="181.25799999999998" height="70.7" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="255.70399999999998" y="322.95000000000005" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="255.70399999999998" dy="-12.350000000000001">factory plane</tspan><tspan x="255.70399999999998" dy="16.900000000000002">gateway, queue, worker</tspan><tspan x="255.70399999999998" dy="16.900000000000002">build + validate + refine</tspan></text>
</g>
<g class="node" data-id="DP" data-label="data plane
GCS, AlloyDB, Firestore,
BigQuery, Bigtable" data-shape="cylinder">
  <rect x="56" y="413.3" width="185.70399999999998" height="70.7" fill="#e6ebff" stroke="none" />
  <line x1="56" y1="413.3" x2="56" y2="484" stroke="#2953ff" stroke-width="0.75" />
  <line x1="241.70399999999998" y1="413.3" x2="241.70399999999998" y2="484" stroke="#2953ff" stroke-width="0.75" />
  <ellipse cx="148.85199999999998" cy="484" rx="92.85199999999999" ry="7" fill="#e6ebff" stroke="#2953ff" stroke-width="0.75" />
  <ellipse cx="148.85199999999998" cy="413.3" rx="92.85199999999999" ry="7" fill="#e6ebff" stroke="#2953ff" stroke-width="0.75" />
  <text x="148.85199999999998" y="448.65000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="#14171c"><tspan x="148.85199999999998" dy="-12.350000000000001">data plane</tspan><tspan x="148.85199999999998" dy="16.900000000000002">GCS, AlloyDB, Firestore,</tspan><tspan x="148.85199999999998" dy="16.900000000000002">BigQuery, Bigtable</tspan></text>
</g>
<g class="node" data-id="TP" data-label="tool plane
Agent Gateway +
