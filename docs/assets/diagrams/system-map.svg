  <rect x="200.27249999999998" y="141.8" width="110.86299999999999" height="53.800000000000004" rx="0" ry="0" fill="#e6ebff" stroke="#2953ff" stroke-width="0.75" />
  <text x="255.70399999999998" y="168.70000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="#14171c"><tspan x="255.70399999999998" dy="-3.9000000000000012">spec (OKF)</tspan><tspan x="255.70399999999998" dy="16.900000000000002">the contract</tspan></text>
</g>
<g class="node" data-id="AGENT" data-label="deployed agent
Agent Runtime, your GCP project" data-shape="rectangle">
  <rect x="140.62199999999999" y="555" width="230.164" height="53.800000000000004" rx="0" ry="0" fill="#e1f3e7" stroke="#16874a" stroke-width="0.75" />
  <text x="255.70399999999998" y="581.9" text-anchor="middle" font-size="13" font-weight="500" fill="#14171c"><tspan x="255.70399999999998" dy="-3.9000000000000012">deployed agent</tspan><tspan x="255.70399999999998" dy="16.900000000000002">Agent Runtime, your GCP project</tspan></text>
</g>
<g class="node" data-id="GE" data-label="Gemini Enterprise
