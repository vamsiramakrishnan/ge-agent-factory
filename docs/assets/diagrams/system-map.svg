  <rect x="269.70399999999995" y="406.3" width="185.70399999999998" height="70.7" rx="0" ry="0" fill="#e1f3e7" stroke="#16874a" stroke-width="0.75" />
  <text x="362.5559999999999" y="441.65000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="#14171c"><tspan x="362.5559999999999" dy="-12.350000000000001">tool plane</tspan><tspan x="362.5559999999999" dy="16.900000000000002">Agent Gateway +</tspan><tspan x="362.5559999999999" dy="16.900000000000002">MCP services + registry</tspan></text>
</g>
</svg>
