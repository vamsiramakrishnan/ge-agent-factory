<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 511.40799999999996 750.5999999999999" width="511.40799999999996" height="750.5999999999999" style="--bg:#ffffff;--fg:#14171c;--line:#565e6c;--accent:#2953ff;--muted:#79818e;--surface:#eceef2;--border:#dfe2e8;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="FACTORY" data-label="the factory: three planes">
  <rect x="40" y="243.60000000000002" width="431.40799999999996" height="263.4" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="243.60000000000002" width="431.40799999999996" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="257.6" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">the factory: three planes</text>
</g>
<polyline class="edge" data-from="UC" data-to="SPEC" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="255.70399999999998,93.80000000000001 255.70399999999998,141.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="SPEC" data-to="FACTORY" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="255.70399999999998,195.60000000000002 255.70399999999998,243.60000000000002" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FACTORY" data-to="AGENT" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="255.70399999999998,507 255.70399999999998,555" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="AGENT" data-to="GE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="255.70399999999998,608.8 255.70399999999998,656.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FP" data-to="DP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="255.70399999999998,358.3 255.70399999999998,382.3 148.85199999999998,382.3 148.85199999999998,406.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FP" data-to="TP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="255.70399999999998,358.3 255.70399999999998,382.3 362.5559999999999,382.3 362.5559999999999,406.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="DP" data-to="FP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="117.90133333333333,406.3 117.90133333333333,370.3 201.32659999999998,370.3 201.32659999999998,358.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="TP" data-to="FP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="331.6053333333333,406.3 331.6053333333333,382.3 273.8298,382.3 273.8298,358.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="UC" data-label="use case
or interview" data-shape="stadium">
  <rect x="200.27249999999998" y="40" width="110.863" height="53.800000000000004" rx="26.900000000000002" ry="26.900000000000002" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="255.70399999999998" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="255.70399999999998" dy="-3.9000000000000012">use case</tspan><tspan x="255.70399999999998" dy="16.900000000000002">or interview</tspan></text>
</g>
<g class="node" data-id="SPEC" data-label="spec (OKF)
