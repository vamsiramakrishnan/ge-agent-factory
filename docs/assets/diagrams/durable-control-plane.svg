<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 932.637 388" width="932.637" height="388" style="--bg:#ffffff;--fg:#202124;--line:#5f6368;--accent:#1a73e8;--muted:#80868b;--surface:#eef3f9;--border:#dadce0;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="loop" data-label="one stage at a time, self-advancing">
  <rect x="325.1" y="158" width="577.5369999999999" height="140" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="325.1" y="158" width="222.90999999999997" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="331.1" y="167" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">loop [one stage at a time, self-advancing]</text>
</g>
<line class="lifeline" data-actor="CLI" x1="70" y1="70" x2="70" y2="358" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="GW" x1="222.55" y1="70" x2="222.55" y2="358" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="CT" x1="409.132" y1="70" x2="409.132" y2="358" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="W" x1="592.75" y1="70" x2="592.75" y2="358" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="L" x1="797.4865" y1="70" x2="797.4865" y2="358" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="CLI" data-to="GW" data-label="build --remote (gcloud identity token)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="222.55" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="146.275" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">build --remote (gcloud identity token)</text>
</g>
<g class="message" data-from="GW" data-to="CT" data-label="enqueue stage task" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="222.55" y1="130" x2="409.132" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="315.841" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">enqueue stage task</text>
</g>
<g class="message" data-from="CT" data-to="W" data-label="deliver task (OIDC, runner SA)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="409.132" y1="198" x2="592.75" y2="198" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="500.94100000000003" y="188" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">deliver task (OIDC, runner SA)</text>
</g>
<g class="message" data-from="W" data-to="L" data-label="record stage event" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="592.75" y1="238" x2="797.4865" y2="238" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="695.11825" y="228" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">record stage event</text>
</g>
<g class="message" data-from="W" data-to="CT" data-label="enqueue next stage" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="592.75" y1="278" x2="409.132" y2="278" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="500.94100000000003" y="268" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">enqueue next stage</text>
</g>
<g class="message" data-from="L" data-to="CLI" data-label="run observable live (console, ge ledger tail)" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="797.4865" y1="318" x2="70" y2="318" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="433.74325" y="308" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">run observable live (console, ge ledger tail)</text>
</g>
<g class="actor" data-id="CLI" data-label="ge CLI" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">ge CLI</text>
</g>
<g class="actor" data-id="GW" data-label="Cloud Run gateway" data-type="participant">
  <rect x="150" y="30" width="145.1" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="222.55" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Cloud Run gateway</text>
</g>
<g class="actor" data-id="CT" data-label="Cloud Tasks queue" data-type="participant">
  <rect x="335.1" y="30" width="148.06400000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="409.132" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Cloud Tasks queue</text>
</g>
<g class="actor" data-id="W" data-label="Cloud Run worker" data-type="participant">
  <rect x="523.164" y="30" width="139.17200000000003" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="592.75" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Cloud Run worker</text>
</g>
<g class="actor" data-id="L" data-label="Firestore + AlloyDB ledger" data-type="participant">
  <rect x="702.336" y="30" width="190.301" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="797.4865" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Firestore + AlloyDB ledger</text>
</g>
</svg>
