title: GE Agent Factory
description: Turn enterprise use cases into generated, tested, deployable Gemini Enterprise agents.

# Render with the just-the-docs theme directly from GitHub (no local build step):
# sidebar navigation + client-side search out of the box.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

# just-the-docs options
search_enabled: true
color_scheme: ge

# Pages that opt into a {:toc} block (the long reference/operations pages) get a
# level 2-3 outline — this excludes each page's own h1 title from listing itself
# as the first TOC entry.
kramdown:
  toc_levels: 2..3
aux_links:
  Source:
    - "https://github.com/vamsiramakrishnan/ge-agent-factory"
aux_links_new_tab: true

# Callout classes usable in markdown as: {: .note } / {: .warning } / {: .important } / {: .tip }
# placed on the line right after a blockquote. Colors resolve to the $blue/$yellow/$red/$green
# swatches in _sass/custom/setup.scss and _sass/support/_variables.scss.
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red
  tip:
    title: Tip
    color: green
  status:
    title: Status
    color: purple

# Keep repo-internal, non-site files out of the build.
exclude:
  - Gemfile
  - Gemfile.lock
  - .bundle/
  - .jekyll-cache/
  - vendor/
  - adr/
  - collateral/
  - diagrams-src/
  - plans/
  - runbooks/
  - skills/
  - superpowers/
