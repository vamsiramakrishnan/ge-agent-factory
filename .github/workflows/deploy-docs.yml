# Builds the docs website (apps/docs — Astro/Starlight, content synced from
# docs/) and deploys it to GitHub Pages. For this to take over from the legacy
# Jekyll build, the repo's Pages settings must have Source = "GitHub Actions".
name: Deploy docs website

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build, audit, and test the site
        run: bun run docs:site:check
      - name: Verify generation leaves tracked sources clean
        run: git diff --exit-code
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
